<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Sprite Open World - Map Loader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Luckiest Guy', cursive; display: flex; align-items: center; justify-content: center; height: 100vh; width: 100vw; }
        #game-viewport { position: relative; overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 100px rgba(0,0,0,1); }
        canvas { display: block; width: 100% !important; height: 100% !important; }
        .full-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; pointer-events: none; }
        #menu-screen { background: url('https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-start-screen.png') center/cover; z-index: 300; pointer-events: auto; justify-content: flex-end; padding-bottom: 8%; }
        .menu-card { background: rgba(0, 0, 0, 0.7); padding: 1rem 2rem; border-radius: 50px; backdrop-filter: blur(12px); display: flex; gap: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .menu-btn { padding: 0.5rem 1.5rem; background: transparent; border: none; color: white; font-size: 1.5rem; text-transform: uppercase; cursor: pointer; transition: transform 0.2s; text-shadow: 2px 2px 0px #000; }
        .menu-btn:hover { transform: scale(1.1); color: #22d3ee; }
        #game-ui { position: absolute; top: 4%; left: 4%; color: white; pointer-events: none; text-shadow: 2px 2px 0 #000; z-index: 200; }
        #fade-overlay { position: absolute; inset: 0; background: black; opacity: 0; pointer-events: none; transition: opacity 0.5s; z-index: 1000; }
    </style>
</head>
<body onclick="tryStartMenuMusic()">

    <audio id="menu-music" loop><source src="https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-theme.mp3" type="audio/mpeg"></audio>
    <audio id="game-music" loop><source src="https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/Whispers_of_the_Verdant_Keep.mp3" type="audio/mpeg"></audio>

    <div id="game-viewport">
        <div id="fade-overlay"></div>
        <div id="menu-screen" class="full-overlay">
            <div class="menu-card">
                <button onclick="onNewGame()" class="menu-btn">Enter World</button>
            </div>
        </div>

        <div id="game-ui" class="hidden">
            <div id="zone-display" class="text-3xl text-cyan-400">Loading...</div>
            <div id="stats" class="text-xl">Gold: <span id="gold-val">0</span></div>
            <div class="text-xs opacity-70 mt-2">Map-driven rendering active</div>
        </div>
    </div>

    <script>
        // --- LEVEL DATA (The "Map Import" Structure) ---
        const WORLD_MAP = {
            biomes: [
                { id: 'town', url: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/village-bg.png', x: 0, z: -5, range: 50 },
                { id: 'forestLeft', url: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/forestbg-3-gemini.png', x: -120, z: -5.1, range: 150 },
                { id: 'forestRight', url: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/forestbg-3-gemini.png', x: 120, z: -5.1, range: 150 }
            ],
            platforms: [
                // Ground floor
                { x: 300, y: -0.62, w: 2000, h: 2, type: 'ground' },
                // Town area platforms
                { x: 5, y: 3.5, w: 4, h: 0.8 },
                { x: 12, y: 5.5, w: 5, h: 0.8 },
                // Forest area platforms
                { x: -60, y: 3, w: 6, h: 1 },
                { x: -70, y: 6, w: 4, h: 1 },
                { x: 80, y: 4, w: 8, h: 1 },
                { x: 95, y: 7, w: 3, h: 0.8 }
            ],
            entities: [
                { type: 'npc', mat: 'shopkeeper', x: 5, y: 0.8, data: { name: 'Merchant', type: 'shop' } },
                { type: 'npc', mat: 'npc', x: -8, y: 0.8, data: { name: 'Mayor', msg: 'The world map is now dynamic!' } },
                { type: 'enemy', x: -60, y: 4.2, range: 10 },
                { type: 'enemy', x: 80, y: 5.2, range: 5 },
                { type: 'enemy', x: 150, y: 1.2, range: 20 }
            ],
            scenery: [
                { type: 'pub', x: -25, y: 2.15, w: 5.06, h: 4.21 }
            ]
        };

        // --- ENGINE CONSTANTS ---
        const TARGET_ASPECT = 16 / 9;
        const VIEW_SIZE = 4.2;
        const GROUND_Y = 0;
        const GRAVITY = -0.015;
        const JUMP_FORCE = 0.32;

        let scene, camera, renderer, clock, player;
        let worldGroup, bgLayers = {}, platforms = [], enemies = [], npcs = [], projectiles = [];
        let keys = {}, gameActive = false, stats = { gold: 0 };
        const textureLoader = new THREE.TextureLoader();
        let MATERIALS = {};

        // --- INITIALIZATION ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a1a);
            camera = new THREE.OrthographicCamera(-VIEW_SIZE * TARGET_ASPECT, VIEW_SIZE * TARGET_ASPECT, VIEW_SIZE, -VIEW_SIZE, 0.1, 1000);
            camera.position.set(0, 5, 20);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            document.getElementById('game-viewport').appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            clock = new THREE.Clock();

            loadMaterials();
            worldGroup = new THREE.Group();
            scene.add(worldGroup);

            loadMap(WORLD_MAP);
            createPlayer();

            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            window.addEventListener('resize', onResize);
            onResize();
            animate();
        }

        function loadMaterials() {
            const createMat = (url, tiles = [1,1]) => {
                const m = new THREE.SpriteMaterial({ map: null, transparent: true });
                textureLoader.load(url, t => { 
                    t.magFilter = THREE.NearestFilter; 
                    t.repeat.set(1/tiles[0], 1/tiles[1]);
                    m.map = t; m.needsUpdate = true; 
                });
                return m;
            };

            MATERIALS = {
                playerStand: createMat('https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-standing-sprite-sheet-2x1-140Px140P.png', [2,1]),
                playerRun: createMat('https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-run-cycle-right-12fps.png', [11,1]),
                enemy: createMat('https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/pokemon/129.png'),
                npc: createMat('https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/pokemon/151.png'),
                shopkeeper: createMat('https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/pokemon/122.png'),
                pub: createMat('https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/pub850x700.png'),
                grass: createMat('https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/grass-tilesheet-944x267-gemini.png', [4,1]),
                brick: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/brick185x185-gemini.png'
            };
        }

        // --- MAP LOADER LOGIC ---
        function loadMap(mapData) {
            // 1. Load Biomes
            const bgH = 8.5;
            mapData.biomes.forEach(b => {
                textureLoader.load(b.url, (tex) => {
                    const aspect = tex.image.width / tex.image.height;
                    const w = bgH * aspect;
                    const mesh = new THREE.Mesh(
                        new THREE.PlaneGeometry(w, bgH),
                        new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: b.id === 'town' ? 1 : 0 })
                    );
                    mesh.position.set(b.x, (5 - VIEW_SIZE) + (bgH * 0.7), b.z);
                    mesh.userData = { w, h: bgH, startX: b.x, id: b.id };
                    bgLayers[b.id] = mesh;
                    worldGroup.add(mesh);
                });
            });

            // 2. Load Platforms
            mapData.platforms.forEach(p => {
                const mat = new THREE.SpriteMaterial({ transparent: true, color: 0x8b4513 });
                textureLoader.load(MATERIALS.brick, t => {
                    t.wrapS = t.wrapT = THREE.RepeatWrapping;
                    t.repeat.set(p.w, p.h);
                    mat.map = t; mat.color.set(0xffffff); mat.needsUpdate = true;
                });
                const sprite = new THREE.Sprite(mat);
                sprite.scale.set(p.w, p.h, 1);
                sprite.position.set(p.x, p.y, 1);
                worldGroup.add(sprite);
                platforms.push({ x: p.x, y: p.y, w: p.w, h: p.h });
            });

            // 3. Load Scenery
            mapData.scenery.forEach(s => {
                const sprite = new THREE.Sprite(MATERIALS[s.type]);
                sprite.scale.set(s.w, s.h, 1);
                sprite.position.set(s.x, s.y, 0.5);
                worldGroup.add(sprite);
            });

            // 4. Load Entities
            mapData.entities.forEach(e => {
                if (e.type === 'npc') {
                    const sprite = new THREE.Sprite(MATERIALS[e.mat]);
                    sprite.scale.set(1.6, 1.6, 1);
                    sprite.position.set(e.x, e.y, 1.5);
                    sprite.userData = e.data;
                    npcs.push({ sprite, group: worldGroup });
                    worldGroup.add(sprite);
                } else if (e.type === 'enemy') {
                    const sprite = new THREE.Sprite(MATERIALS.enemy);
                    sprite.scale.set(1.2, 1.2, 1);
                    sprite.position.set(e.x, e.y, 2);
                    sprite.userData = { startX: e.x, range: e.range || 5, dir: 1 };
                    enemies.push(sprite);
                    worldGroup.add(sprite);
                }
            });

            // 5. Procedural Grass Fill based on platform width
            mapData.platforms.filter(p => p.type === 'ground').forEach(p => {
                for(let gx = p.x - p.w/2; gx < p.x + p.w/2; gx += 2) {
                    const g = new THREE.Sprite(MATERIALS.grass.clone());
                    g.position.set(gx, GROUND_Y, 0.6);
                    g.scale.set(2, 2, 1);
                    g.material.map = MATERIALS.grass.map.clone();
                    g.material.map.offset.x = Math.random() > 0.8 ? (Math.floor(Math.random()*3)/4) : 0.75;
                    worldGroup.add(g);
                }
            });
        }

        function createPlayer() {
            player = new THREE.Sprite(MATERIALS.playerStand);
            player.scale.set(2.2, 2.2, 1);
            player.position.set(0, 5, 2);
            player.userData = { vy: 0, onGround: false, width: 0.7, height: 1.1, facingRight: true, animFrame: 0, animTimer: 0 };
            scene.add(player);
        }

        function animate() {
            requestAnimationFrame(animate);
            if(!gameActive) { renderer.render(scene, camera); return; }

            // Movement & Physics
            const speed = 0.15;
            let moving = false;
            if(keys['KeyA'] || keys['ArrowLeft']) { player.position.x -= speed; player.userData.facingRight = false; moving = true; }
            if(keys['KeyD'] || keys['ArrowRight']) { player.position.x += speed; player.userData.facingRight = true; moving = true; }
            
            player.userData.vy += GRAVITY;
            player.position.y += player.userData.vy;
            player.userData.onGround = false;

            // Collision using Map Platforms
            platforms.forEach(p => {
                const pTop = p.y + p.h/2, pBottom = p.y - p.h/2, pLeft = p.x - p.w/2, pRight = p.x + p.w/2;
                const rTop = player.position.y + player.userData.height/2, rBottom = player.position.y - player.userData.height/2;
                const rLeft = player.position.x - player.userData.width/2, rRight = player.position.x + player.userData.width/2;

                if (rLeft < pRight && rRight > pLeft && rBottom < pTop && rTop > pBottom) {
                    if (player.userData.vy < 0) {
                        player.position.y = pTop + player.userData.height/2;
                        player.userData.vy = 0;
                        player.userData.onGround = true;
                    }
                }
            });

            if(keys['Space'] && player.userData.onGround) player.userData.vy = JUMP_FORCE;

            // Animation
            if (moving) {
                player.material = MATERIALS.playerRun;
                if (++player.userData.animTimer > 5) { player.userData.animFrame = (player.userData.animFrame + 1) % 11; player.userData.animTimer = 0; }
                player.material.map.offset.x = player.userData.animFrame / 11;
            } else {
                player.material = MATERIALS.playerStand;
                player.material.map.offset.x = player.userData.facingRight ? 0.5 : 0;
            }

            // Camera & Biome Transitions
            camera.position.x += (player.position.x - camera.position.x) * 0.1;
            camera.position.y += (Math.max(GROUND_Y + 4, player.position.y + 1) - camera.position.y) * 0.05;

            const px = player.position.x;
            Object.keys(bgLayers).forEach(key => {
                const mesh = bgLayers[key];
                const biome = WORLD_MAP.biomes.find(b => b.id === key);
                const dist = Math.abs(px - biome.x);
                const targetOpacity = dist < biome.range ? 1 : Math.max(0, 1 - (dist - biome.range) / 20);
                mesh.material.opacity = THREE.MathUtils.lerp(mesh.material.opacity, targetOpacity, 0.05);
                mesh.position.x = mesh.userData.startX + (camera.position.x * 0.98);
                mesh.position.y = (camera.position.y - VIEW_SIZE) + (mesh.userData.h / 2);
            });

            // Enemy Logic
            enemies.forEach(en => {
                en.position.x += 0.04 * en.userData.dir;
                if(Math.abs(en.position.x - en.userData.startX) > en.userData.range) en.userData.dir *= -1;
            });

            updateUI();
            renderer.render(scene, camera);
        }

        function updateUI() {
            document.getElementById('gold-val').innerText = stats.gold;
            const px = player.position.x;
            let zone = "The Unknown";
            if (Math.abs(px) < 50) zone = "SpriteVille Central";
            else if (px < -50) zone = "Whispering Woods";
            else if (px > 50) zone = "Sunrise Ridge";
            document.getElementById('zone-display').innerText = zone;
        }

        function onNewGame() {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-ui').classList.remove('hidden');
            gameActive = true;
            if (window.AudioContext) {
                const g = document.getElementById('game-music');
                g.volume = 0.3; g.play().catch(()=>{});
            }
        }

        function onResize() {
            const v = document.getElementById('game-viewport');
            const w = window.innerWidth, h = window.innerHeight;
            const aspect = w / h;
            let finalW, finalH;
            if (aspect > TARGET_ASPECT) { finalH = h; finalW = h * TARGET_ASPECT; }
            else { finalW = w; finalH = w / TARGET_ASPECT; }
            v.style.width = finalW + 'px'; v.style.height = finalH + 'px';
            renderer.setSize(finalW, finalH);
        }

        function tryStartMenuMusic() {
            const m = document.getElementById('menu-music');
            if (m.paused && !gameActive) { m.volume = 0.3; m.play().catch(()=>{}); }
        }

        window.onload = init;
    </script>
</body>
</html>
