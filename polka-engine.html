<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Sprite Engine - WebGL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Luckiest Guy', cursive; }
        canvas { display: block; }
        
        .full-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            pointer-events: none;
        }

        #menu-screen {
            background-image: url('https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-start-screen.png');
            background-size: cover;
            background-position: center;
            z-index: 300;
            pointer-events: auto;
            justify-content: flex-end;
            padding-bottom: 8vh;
        }

        .menu-card {
            background: rgba(0, 0, 0, 0.6);
            padding: 1rem 2rem;
            border-radius: 50px;
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: row;
            gap: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .menu-btn {
            padding: 0.5rem 1.5rem;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            pointer-events: auto;
            white-space: nowrap;
            text-shadow: 2px 2px 0px #000;
        }

        .menu-btn:hover {
            transform: scale(1.2) rotate(-2deg);
            color: #22d3ee;
            text-shadow: 4px 4px 0px rgba(34, 211, 238, 0.3);
            background: transparent;
        }

        #intro-overlay {
            background: black;
            z-index: 200;
            display: none;
            pointer-events: auto;
        }
        
        #intro-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #game-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            text-shadow: 2px 2px 0 #000;
        }

        #boss-hp-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            display: none;
        }

        .hp-bar {
            height: 20px;
            background: #441111;
            border: 3px solid white;
            border-radius: 10px;
            overflow: hidden;
        }

        #hp-fill {
            height: 100%;
            background: #ff0000;
            width: 100%;
            transition: width 0.3s;
        }

        #message-box {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #facc15;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 1.2rem;
            display: none;
        }
    </style>
</head>
<body>

    <div id="menu-screen" class="full-overlay">
        <div class="menu-card">
            <button onclick="onNewGame()" class="menu-btn">New Game</button>
            <button onclick="showMessage('Save disabled in Demo')" class="menu-btn">Load Game</button>
            <button onclick="showMessage('Graphics: Ultra')" class="menu-btn">Options</button>
        </div>
    </div>

    <div id="intro-overlay" class="full-overlay">
        <video id="intro-video" preload="auto">
            <source src="https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-start-screen-grok.mp4" type="video/mp4">
        </video>
    </div>

    <div id="game-ui" class="hidden">
        <div id="level-name" class="text-3xl text-cyan-400">Level 1: 3D Plains</div>
        <div class="text-sm opacity-80">WASD to Move | Space to Jump | Click to Shoot</div>
    </div>

    <div id="boss-hp-container">
        <div class="text-center text-white mb-1 uppercase">Gyarados Overlord</div>
        <div class="hp-bar"><div id="hp-fill"></div></div>
    </div>

    <div id="message-box"></div>

    <script>
        // --- CONFIG & STATE ---
        let scene, camera, renderer, clock;
        let player, enemies = [], platforms = [], projectiles = [], boss = null;
        let keys = {};
        let gameActive = false;
        let worldWidth = 200;
        
        const PLAYER_SPEED = 0.15;
        const JUMP_FORCE = 0.25;
        const GRAVITY = -0.01;

        // --- INITIALIZATION ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 20, 50);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 12);
            camera.lookAt(0, 2, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Lighting
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);

            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(10, 20, 10);
            sun.castShadow = true;
            scene.add(sun);

            clock = new THREE.Clock();

            createLevel();
            createPlayer();
            
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            window.addEventListener('mousedown', shoot);

            animate();
        }

        function createPlayer() {
            const geometry = new THREE.SphereGeometry(0.6, 32, 32);
            const material = new THREE.MeshPhongMaterial({ color: 0xffff00 });
            player = new THREE.Mesh(geometry, material);
            player.position.set(0, 2, 0);
            player.castShadow = true;
            player.userData = { vy: 0, onGround: false, radius: 0.6 };
            scene.add(player);
        }

        function createLevel() {
            // Ground
            const groundGeo = new THREE.BoxGeometry(worldWidth, 2, 4);
            const groundMat = new THREE.MeshPhongMaterial({ color: 0x228b22 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.position.y = -1;
            ground.receiveShadow = true;
            scene.add(ground);
            platforms.push(ground);

            // Decorative Clouds/Obstacles
            for(let i=0; i < 40; i++) {
                const x = Math.random() * worldWidth - 50;
                const y = Math.random() * 5 + 2;
                const size = Math.random() * 2 + 1;
                
                const boxGeo = new THREE.BoxGeometry(size, 0.5, 2);
                const boxMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
                const plat = new THREE.Mesh(boxGeo, boxMat);
                plat.position.set(x, y, 0);
                plat.castShadow = true;
                plat.receiveShadow = true;
                scene.add(plat);
                platforms.push(plat);

                if(Math.random() > 0.7) spawnEnemy(x, y + 1);
            }
        }

        function spawnEnemy(x, y) {
            const geometry = new THREE.BoxGeometry(0.8, 0.8, 0.8);
            const material = new THREE.MeshPhongMaterial({ color: 0xff0000 });
            const enemy = new THREE.Mesh(geometry, material);
            enemy.position.set(x, y, 0);
            enemy.castShadow = true;
            enemy.userData = { speed: 0.05, range: 3, startX: x };
            scene.add(enemy);
            enemies.push(enemy);
        }

        function shoot() {
            if(!gameActive) return;
            const geo = new THREE.SphereGeometry(0.2, 8, 8);
            const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const bullet = new THREE.Mesh(geo, mat);
            bullet.position.copy(player.position);
            bullet.userData = { vx: 0.5 }; 
            scene.add(bullet);
            projectiles.push(bullet);
        }

        // --- GAME LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            if (!gameActive) {
                renderer.render(scene, camera);
                return;
            }

            const delta = clock.getDelta();

            // Player Movement
            if (keys['KeyA'] || keys['ArrowLeft']) player.position.x -= PLAYER_SPEED;
            if (keys['KeyD'] || keys['ArrowRight']) player.position.x += PLAYER_SPEED;
            
            player.userData.vy += GRAVITY;
            player.position.y += player.userData.vy;

            // Simple Collision
            player.userData.onGround = false;
            platforms.forEach(p => {
                const pBox = new THREE.Box3().setFromObject(p);
                const playerBox = new THREE.Box3().setFromCenterAndSize(player.position, new THREE.Vector3(1, 1, 1));
                
                if (pBox.intersectsBox(playerBox) && player.userData.vy <= 0) {
                    player.position.y = pBox.max.y + 0.5;
                    player.userData.vy = 0;
                    player.userData.onGround = true;
                }
            });

            if ((keys['Space'] || keys['KeyW']) && player.userData.onGround) {
                player.userData.vy = JUMP_FORCE;
            }

            // Enemies
            enemies.forEach(en => {
                en.position.x += en.userData.speed;
                if(Math.abs(en.position.x - en.userData.startX) > en.userData.range) en.userData.speed *= -1;
                
                if(player.position.distanceTo(en.position) < 1) {
                    gameOver();
                }
            });

            // Projectiles
            projectiles.forEach((p, idx) => {
                p.position.x += p.userData.vx;
                enemies.forEach((en, eIdx) => {
                    if(p.position.distanceTo(en.position) < 1) {
                        scene.remove(en);
                        enemies.splice(eIdx, 1);
                        scene.remove(p);
                        projectiles.splice(idx, 1);
                    }
                });
                if(p.position.x > player.position.x + 20) {
                    scene.remove(p);
                    projectiles.splice(idx, 1);
                }
            });

            // Camera follow
            camera.position.x += (player.position.x - camera.position.x) * 0.1;
            
            // Death plane
            if(player.position.y < -5) gameOver();

            renderer.render(scene, camera);
        }

        function onNewGame() {
            document.getElementById('menu-screen').style.display = 'none';
            const introOverlay = document.getElementById('intro-overlay');
            const introVideo = document.getElementById('intro-video');
            
            introOverlay.style.display = 'flex';
            introVideo.play().catch(e => { console.log("Video block"); });
            introVideo.onended = () => { closeIntro(); };
        }

        function closeIntro() {
            const introVideo = document.getElementById('intro-video');
            introVideo.pause();
            document.getElementById('intro-overlay').style.display = 'none';
            startGame();
        }

        function startGame() {
            document.getElementById('game-ui').classList.remove('hidden');
            gameActive = true;
        }

        function gameOver() {
            gameActive = false;
            showMessage("GAME OVER - RELOADING...");
            setTimeout(() => location.reload(), 2000);
        }

        function showMessage(txt) {
            const box = document.getElementById('message-box');
            box.innerText = txt;
            box.style.display = 'block';
            setTimeout(() => box.style.display = 'none', 2000);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = init;
    </script>
</body>
</html>
